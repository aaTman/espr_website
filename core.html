<head>

</head>
<body>
    <div id="mainmap"></div>
    <script>var mymap = L.map('mainmap').setView([41, -73], 6);

    var Stamen_TonerLite = L.tileLayer('https://stamen-tiles-{s}.a.ssl.fastly.net/toner-lite/{z}/{x}/{y}{r}.{ext}', {
	attribution: 'Map tiles by <a href="http://stamen.com">Stamen Design</a>, <a href="http://creativecommons.org/licenses/by/3.0">CC BY 3.0</a> &mdash; Map data &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
	subdomains: 'abcd',
	minZoom: 0,
	maxZoom: 20,
	ext: 'png'
});
    var mapbox = L.tileLayer('https://api.tiles.mapbox.com/styles/v1/mapbox/{id}/tiles/{tileSize}/{z}/{x}/{y}?access_token={accessToken}', {
  attribution: 'Map data &copy; <a href="http://openstreetmap.org">OpenStreetMap</a> contributors, <a href="http://creativecommons.org/licenses/by-sa/2.0/">CC-BY-SA</a>, Imagery © <a href="http://mapbox.com">Mapbox</a>',
  maxZoom: 18,
  id: 'dark-v10',
  accessToken: 'pk.eyJ1IjoidG1hbjEzOTIiLCJhIjoiY2pwNDMxcWR6MGVjYzNrcXc5b2hsejV5NSJ9.ewUg60MaDj4gaEKkJR1ABQ',
  tileSize: 512, 
  zoomOffset: -1
})

mapbox.addTo(mymap);


</script>
</body>
